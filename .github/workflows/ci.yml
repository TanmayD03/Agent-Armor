name: AgentArmor CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]          # publish on any version tag push
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:        # allow manual publish trigger from GitHub UI
    inputs:
      publish:
        description: 'Publish to PyPI?'
        required: false
        default: false
        type: boolean

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint & Code Quality
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint check
        run: ruff check agent_armor/ cli/ --output-format=github

      - name: Ruff format check
        run: ruff format --check agent_armor/ cli/

  # ──────────────────────────────────────────────
  # Job 2: Run Tests (multi-version matrix)
  # ──────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=agent_armor --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: unittests
          name: kvlr-coverage

  # ──────────────────────────────────────────────
  # Job 2: AgentArmor Self-Attestation Check
  # Verifies that all .py files in the repo pass
  # the AgentArmor Zero-Trust pipeline.
  # ──────────────────────────────────────────────
  self-attest:
    name: AgentArmor Self-Attestation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AgentArmor
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run AgentArmor on source files
        run: |
          echo "🛡️ Running AgentArmor self-attestation on repository source..."
          kvlr scan agent_armor/ --report --output self-attest-report.json || true
          echo "Self-attestation complete."

      - name: Verify shadow-chain integrity
        run: |
          echo "🔗 Verifying Shadow-Chain integrity..."
          python -c "
          from agent_armor.shadow_chain.chain_manager import ShadowChainManager
          cm = ShadowChainManager()
          result = cm.verify_chain()
          print(f'Chain integrity: {result}')
          "

      - name: Upload attestation report
        uses: actions/upload-artifact@v4
        with:
          name: kvlr-attestation
          path: self-attest-report.json
        if: always()

  # ──────────────────────────────────────────────
  # Job 3: Dependency Validation (Slopsquatting)
  # ──────────────────────────────────────────────
  check-deps:
    name: Slopsquatting Guard - Dependency Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AgentArmor
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate dependencies
        run: |
          echo "📦 Running Slopsquatting Guard on requirements.txt..."
          kvlr check-deps requirements.txt

  # ──────────────────────────────────────────────
  # Job 4: Publish to PyPI (on GitHub Release)
  # ──────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, self-attest, check-deps]
    if: >
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
